name: Deploy to Cloudflare Workers

on:
  workflow_dispatch:

concurrency:
  group: production
  cancel-in-progress: false

jobs:
  deploy:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://gallery.aleviclop.dev/
    permissions:
      contents: read
      deployments: write
    env:
      NEXT_PUBLIC_BASE_URL: https://gallery.aleviclop.dev
      NEXT_PUBLIC_WEB3FORMS_ACCESS_KEY: ${{ secrets.NEXT_PUBLIC_WEB3FORMS_ACCESS_KEY }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Enable Corepack
        run: corepack enable

      - name: Setup Node.js and pnpm cache
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate production configuration
        shell: bash
        run: |
          test -n "$NEXT_PUBLIC_WEB3FORMS_ACCESS_KEY"
          test -n "$CLOUDFLARE_API_TOKEN"
          test -n "$CLOUDFLARE_ACCOUNT_ID"

      - name: Validate and deploy
        run: pnpm deploy:wrangler

      - name: Record deployment identifiers
        run: pnpm exec wrangler deployments list --json

      - name: Smoke test canonical routes
        shell: bash
        run: |
          root_headers=""
          for attempt in {1..10}; do
            root_headers="$(curl --fail --silent --show-error --dump-header - --output /dev/null 'https://gallery.aleviclop.dev/?ref=workflow')"
            if grep -qE '^HTTP/[^ ]+ 307' <<<"$root_headers" && grep -qiE '^location: https://gallery\.aleviclop\.dev/en\?ref=workflow\r?$' <<<"$root_headers"; then
              break
            fi
            sleep 3
          done
          grep -qE '^HTTP/[^ ]+ 307' <<<"$root_headers"
          grep -qiE '^location: https://gallery\.aleviclop\.dev/en\?ref=workflow\r?$' <<<"$root_headers"
          curl --fail --silent --show-error https://gallery.aleviclop.dev/es >/dev/null
          curl --fail --silent --show-error https://gallery.aleviclop.dev/en >/dev/null
          curl --fail --silent --show-error https://gallery.aleviclop.dev/robots.txt >/dev/null
          curl --fail --silent --show-error https://gallery.aleviclop.dev/sitemap.xml >/dev/null
          test "$(curl --silent --output /dev/null --write-out '%{http_code}' https://gallery.aleviclop.dev/release-smoke-404)" = "404"
          test "$(curl --silent --output /dev/null --write-out '%{http_code}' https://gallery.aleviclop.dev/photos/raw/14.webp)" = "404"
