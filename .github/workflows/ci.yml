name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    env:
      NEXT_PUBLIC_BASE_URL: https://gallery.aleviclop.dev
      NEXT_PUBLIC_WEB3FORMS_ACCESS_KEY: ci-placeholder-public-key
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Enable Corepack
        run: corepack enable

      - name: Setup Node.js and pnpm cache
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Test
        run: pnpm test

      - name: Build static export
        run: pnpm build

      - name: Check whitespace errors
        run: git diff --check
